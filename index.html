<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiho Park | Interactive Resume</title>
    <style>
        /* 1. 배경 설정 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 배경 이미지 (파일명 확인!) */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Plain-M%26Ms-Pile.jpg/1920px-Plain-M%26Ms-Pile.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Pretendard', sans-serif;
            color: white;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            text-align: center;
            width: 90%;
            max-width: 850px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .text1 { font-size: 2.2em; font-weight: bold; margin-bottom: 5px; }
        .text2 { font-size: 1.1em; color: #ccc; margin-bottom: 25px; }

        /* 2. 탭 메뉴 */
        .tab-menu {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid white;
            color: white;
            padding: 10px 25px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        .tab-btn:hover, .tab-btn.active {
            background: white;
            color: black;
            transform: translateY(-3px); /* 마우스 오버 시 살짝 위로 */
        }

        /* 3. PDF 출력 영역 및 마우스 오버 */
        .content-area {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .content-area.active { display: block; }

        .pdf-container {
            width: 100%;
            height: 500px; /* PDF 높이 조절 */
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s ease; /* 마우스 오버 애니메이션 */
            border: 2px solid rgba(255,255,255,0.3);
        }

        /* PDF 영역 마우스 오버 시 강조 */
        .pdf-container:hover {
            transform: scale(1.02);
            border-color: #00d2ff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="text1">Jiho Park</div>
    <div class="text2">9th Grade</div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="openTab('tab-pdf')">View Resume (PDF)</button>
        <button class="tab-btn" onclick="openTab('tab-info')">Contact & Links</button>
    </div>

    <div id="tab-pdf" class="content-area active">
        <div class="pdf-container">
            <iframe src="resume.pdf"></iframe>
        </div>
        <p style="margin-top:10px; font-size:0.8em; color:#bbb;">* PDF가 보이지 않으면 브라우저 설정을 확인하세요.</p>
    </div>

    <div id="tab-info" class="content-area">
        <div style="background: rgba(255,255,255,0.1); padding: 30px; border-radius: 10px;">
            <h3>Contact Information</h3>
            <p>📧 Email: jiho@school.com</p>
            <p>💻 GitHub: github.com/jihopark</p>
            <hr style="border:0.5px solid rgba(255,255,255,0.2);">
            <p><strong>Awards:</strong> 텍스트</p>
        </div>
    </div>
</div>

<script>
    function openTab(tabId) {
        document.querySelectorAll('.content-area').forEach(a => a.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>

</body>
</html>
